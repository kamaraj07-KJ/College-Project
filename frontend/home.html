<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toxiguard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

.container {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 220px;
  background-color: #2c3e50;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 1rem;
}

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar ul li {
  margin: 15px 0;
}

.sidebar ul li a {
  color: white;
  text-decoration: none;
  font-size: 1rem;
}

.main-content {
  flex-grow: 1;
  padding: 20px;
  background-color: #ffffff;
}

header h1 {
  margin-top: 0;
}

.upload-section {
  margin-top: 20px;
  background: #ecf0f1;
  padding: 20px;
  border-radius: 8px;
}

.upload-section input[type="file"] {
  display: block;
  margin: 20px 0;
}
.upload-section input[type="submit"]{
  
  display: inline-block;
  outline: 0;
  cursor: pointer;
  padding: 5px 16px;
  font-size: 14px;
  font-weight: 500;
  line-height: 20px;
  vertical-align: middle;
  border: 1px solid;
  border-radius: 8px;
  color: #ffffff;
  background-color: #2ea44f;
  border-color: #1b1f2326;
  box-shadow: rgba(27, 31, 35, 0.04) 0px 1px 0px 0px, rgba(255, 255, 255, 0.25) 0px 1px 0px 0px inset;
  transition: 0.2s cubic-bezier(0.3, 0, 0.5, 1);
  transition-property: color, background-color, border-color;
  :hover {
       background-color: #2c974b;
       border-color: #1b1f2326;
      transition-duration: 0.1s;
                    }
                
}

#videoPreview {
  width: 100%;
  max-width: 600px;
  height: auto;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

.analysis-section {
  margin-top: 30px;
}

.results-box {
  background: #dff0d8;
  border-left: 5px solid #3c763d;
  padding: 15px;
  border-radius: 5px;
  max-width: 600px;
}

</style>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2>Toxic Analyzer</h2>
      <ul>
        <li><a href="upload.html">Dashboard</a></li>
        <li><a href="home.html">Upload Video</a></li>
        <li><a href="#">Reports</a></li>
      
      </ul>
    </aside>

    <main class="main-content">
      <header>
        <h1>Video Sentiment Analysis</h1>
      </header>

      <section class="upload-section">
        <label for="videoUpload">Upload a Video:</label>
        <input type="file" id="videoUpload" accept="video/*">
        <video id="videoPreview" controls></video> <br> <br>
        <input type="submit" value="Analyze Video">
      </section>

      <section class="analysis-section">
        <h2>Analysis Results</h2>
        <div class="results-box">
          <p><strong>Detected Emotion:</strong> Neutral</p>
          <p><strong>Confidence:</strong> 87%</p>
          <p><strong>Time Range:</strong> 00:15s – 00:45s</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const videoUpload = document.getElementById('videoUpload');
    const videoPreview = document.getElementById('videoPreview');

    videoUpload.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const videoURL = URL.createObjectURL(file);
        videoPreview.src = videoURL;
      }
    });
  </script>
</body>
</html>
